name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Una sola corrida a la vez; nuevas pisan a las pendientes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necesario para que peaceiris/actions-gh-pages pushee.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Pushea ./dist a la rama gh-pages — mismo target que `npm run deploy`
      # localmente. Pages está configurado para servir desde esa rama.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
